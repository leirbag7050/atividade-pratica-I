<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <header>
      <h1>Formulário de Contato</h1>
    </header>
        <main>
            <form action="sucesso.html" method="post">
                <section>
                    <fieldset>
                        <legend>Informações Pessoais</legend>
                            <p>
                                <label for="nome">Nome:</label><br>
                                <input type="text" id="nome" name="nome" required>
                            </p>
                            <p>
                                <label for="email">Email:</label><br>
                                <input type="email" id="email" name="email" required>
                            </p>
                            <p>
                                <label for="assunto">Assunto:</label><br>
                                <input type="text" id="assunto" name="assunto" required>
                            </p>
                            <p>
                                <label for="mensagem">Mensagem:</label><br>
                                <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
                            </p>
                        </fieldset>
                    </section>
                    <section>
                        <fieldset>
                            <legend>Meios de Contato</legend>
                                <p>
                                    <label for="contato-email">E-mail:</label><br>
                                    <input type="email" id="contato-email" name="email">
                                </p>
                                <p>
                                    <label for="contato-telefone">Telefone:</label><br>
                                    <input type="number" id="contato-telefone" name="preferencia-contato" value="telefone">
                                </p>
                                <p>
                                    <label for="contato-whatsapp">WhatsApp:</label><br>
                                    <input type="number" id="contato-whatsapp" name="preferencia-contato" value="whatsapp">
                                </p>
                        </fieldset>
                    </section>
                    <section>
                        <fieldset>
                            <legend>Serviços</legend>
                            <p>Qual serviço você está interessado(a)?</p>
                            <p>
                                <label for="servico-assistencia-tecnica">Assistência Técnica</label>
                                <input type="radio" id="servico-assistencia-tecnica" name="servicos" value="assitencia-tecnica">
                            </p>
                            <p>
                                <label for="servico-consultoria">Consultoria</label>
                                <input type="radio" id="servico-consultoria" name="servicos" value="consultoria">
                                <label for="servico-outros">Outros</label>
                                <input type="radio" id="servico-outros" name="servicos" value="outros">
                            </p>
                        </fieldset>
                    </section>
                    <section>
                        <fieldset>
                            <legend>Data do Agendamento</legend>
                            <p>
                                <label for="data-agendamento">Escolha a data para o agendamento:</label>
                                <input type="date" id="data-agendamento" name="data-agendamento" required>
                            </p>
                        </fieldset>
                    </section>
                    <section>
                        <fieldset>
                            <legend>Enviar formulário</legend>
                            <p>
                                <input type="submit" value="Enviar">
                                <input type="reset" value="Limpar">
                            </p>
                        </fieldset>
                    </section>
                </form>
            </main>
        </body>
        </html>
